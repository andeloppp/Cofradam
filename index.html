<main>

<script>
// ═══════════════════════════════════════════════
// REGISTRO DEL SERVICE WORKER (Añadido para PWA)
// ═══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('Service Worker registrado con éxito', reg);
    }).catch(err => {
      console.log('Fallo al registrar el Service Worker', err);
    });
  });
}

// ═══════════════════════════════════════════════
// VARIABLES Y CONFIG
// ═══════════════════════════════════════════════
let mediaRecorder = null, audioChunks = [], grabando = false;
let audioBlobTemporal = null, reproductorActual = null;
let leafletMap = null, markersGroup = null;

// Variables para la lógica del Visualizador (Añadido)
let audioContext = null;
let analyser = null;
let animationId = null;

localforage.config({ name: 'ShazamCofrade', storeName: 'audios' });

// ═══════════════════════════════════════════════
// GRABACIÓN Y RECONOCIMIENTO
// ═══════════════════════════════════════════════
async function toggleGrabacion() {
    if (grabando) return; 
    try {
        // 1. Pedimos permiso al micro (esta línea ya la deberías tener, o una muy parecida)
const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

// ═══════════════════════════════════════════════
// INICIO DEL FILTRO DE AUDIO (ESTUDIO VIRTUAL)
// ═══════════════════════════════════════════════

// Aseguramos compatibilidad con todos los navegadores móviles
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
const source = audioContext.createMediaStreamSource(stream);

// Filtro 1: Cortar graves (Bombos, racheo, viento fuerte)
const filtroGraves = audioContext.createBiquadFilter();
filtroGraves.type = 'highpass';
filtroGraves.frequency.value = 300; 

// Filtro 2: Cortar agudos (Silbidos, voces chillonas, ruido blanco)
const filtroAgudos = audioContext.createBiquadFilter();
filtroAgudos.type = 'lowpass';
filtroAgudos.frequency.value = 3000; 

// Destino final del audio ya limpio
const destinoLimpio = audioContext.createMediaStreamDestination();

// Conectamos los cables virtuales en cadena
source.connect(filtroGraves);
filtroGraves.connect(filtroAgudos);
filtroAgudos.connect(destinoLimpio);

// ═══════════════════════════════════════════════
// FIN DEL FILTRO DE AUDIO
// ═══════════════════════════════════════════════

// CAMBIO IMPORTANTE: Ahora la grabadora usa 'destinoLimpio.stream' en vez del 'stream' original
mediaRecorder = new MediaRecorder(destinoLimpio.stream);

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => procesarAudio();
        
        mediaRecorder.start();
        grabando = true;
        setEstado('grabando');
        iniciarVisualizador(stream); // <- INICIAMOS EL DIBUJO DE ONDAS AQUI
        
        setTimeout(() => {
    // 1. Paramos el grabador
    mediaRecorder.stop();
    
    // 2. Apagamos el micrófono usando el stream ORIGINAL (¡Muy importante!)
    stream.getTracks().forEach(track => track.stop());
    
    // 3. ¡NUEVO! Apagamos el filtro para liberar memoria del móvil
    if (audioContext && audioContext.state !== 'closed') {
        audioContext.close();
    }
    
    // Y aquí ya seguiría tu código normal de parar el visualizador, etc.
    // ...
}, 12000); // Tus 12 segundos de grabación
    } catch(err) {
        alert("Error: Activa el permiso de micrófono.");
    }
}

// ── LÓGICA DEL VISUALIZADOR DE ESPECTRO (Añadido) ──
function iniciarVisualizador(stream) {
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');
    canvas.style.display = 'block'; // Mostramos el canvas

    // Crear contexto de audio si no existe
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    
    // Conectar la fuente (micrófono) al analizador
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);

    // Configuración del analizador
    analyser.fftSize = 256; // Tamaño de la Transformada Rápida de Fourier
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    // Función que dibuja frame a frame
    function draw() {
        if (!grabando) return; // Parar si ya no grabamos
        
        animationId = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray); // Obtener datos de frecuencia

        // Limpiar el canvas
        canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

        // Parámetros de dibujo
        const barWidth = (canvas.width / bufferLength) * 2.5;
        let barHeight;
        let x = 0;

        // Dibujar cada barra
        for (let i = 0; i < bufferLength; i++) {
            barHeight = dataArray[i] / 2.5; // Escalamos la altura
            
            // Color de las ondas: un degradado de oro a rojo según la altura
            // r: va bajando de 201 (oro) a medida que sube la barra
            // g: va bajando de 168 (oro) a medida que sube la barra
            // b: fijo en 76 (oro)
            // Esto hace que las barras altas sean más rojizas/oscuras
            const r = 201 - (barHeight * 0.5);
            const g = 168 - (barHeight * 1.5);
            const b = 76;
            canvasCtx.fillStyle = `rgb(${r},${g},${b})`;
            
            // Dibujar barra desde abajo hacia arriba
            canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

            x += barWidth + 1; // Espacio entre barras
        }
    }

    draw(); // Iniciar bucle de dibujo
}

function detenerVisualizador() {
    // Parar la animación
    if (animationId) {
        cancelAnimationFrame(animationId);
    }
    // Cerrar contexto de audio para liberar recursos
    if (audioContext && audioContext.state !== 'closed') {
        audioContext.close();
    }
    // Ocultar canvas
    document.getElementById('visualizer').style.display = 'none';
}
// ───────────────────────────────────────────────────

async function procesarAudio() {
    grabando = false;
    setEstado('procesando');
    
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onloadend = async () => {
        const base64Audio = reader.result.split(',')[1];
        try {
            const res = await fetch('/api/identificar', {
                method: 'POST',
                body: JSON.stringify({ audioBase64: base64Audio })
            });
            const data = await res.json();
            mostrarResultado(data, blob);
        } catch(e) {
            audioBlobTemporal = blob;
            mostrarOpcionGuardar('📡 Sin conexión', 'Sin conexión (Pendiente)');
        }
    };
}

function mostrarResultado(data, blob) {
    setEstado('listo');
    const wrap = document.getElementById('resultado-wrap');
    wrap.style.display = 'block';

    if (data.status?.code === 0 && data.metadata?.music?.[0]) {
        const m = data.metadata.music[0];
        const nombre = m.title;
        guardarConUbicacion(nombre, false, null);
        wrap.innerHTML = `
            <div class="resultado-card" style="padding:24px; border:1px solid var(--oro); background:rgba(201,168,76,0.08); border-radius: 8px; backdrop-filter: blur(4px);">
                <div style="font-family:'Cinzel'; color:var(--oro); font-size:26px; margin-bottom: 5px; font-weight: bold;">${nombre}</div>
                <div style="font-size:14px; opacity:0.8;"><i class="fa-solid fa-check" style="color: #2ecc71;"></i> Identificada con éxito</div>
                <button class="btn-otra" style="width:100%; margin-top:20px; padding:12px; background:var(--oro); border:none; font-family:'Cinzel'; font-weight:bold; cursor:pointer; border-radius:4px;" onclick="location.reload()"><i class="fa-solid fa-microphone-lines"></i> OTRA MARCHA</button>
            </div>
        `;
    } else {
        audioBlobTemporal = blob;
        mostrarOpcionGuardar('🤷🏻‍♂️ No reconocida', 'Marcha Desconocida');
    }
}

// ═══════════════════════════════════════════════
// GUARDADO OPCIONAL Y GPS 
// ═══════════════════════════════════════════════
function mostrarOpcionGuardar(errorTxt, nombreTemp) {
    const wrap = document.getElementById('resultado-wrap');
    wrap.style.display = 'block';
    const url = URL.createObjectURL(audioBlobTemporal);
    wrap.innerHTML = `
        <div class="resultado-error">
            <strong style="font-size: 18px;"><i class="fa-solid fa-triangle-exclamation"></i> ${errorTxt}</strong><br><small style="opacity:0.8; display:block; margin-top:5px;">¿Quieres guardar la grabación en tu libreta para intentarlo luego?</small>
            <audio controls src="${url}" style="width:100%; margin:18px 0; height:35px; outline:none; border-radius:20px;"></audio>
            <div style="display:flex; gap:10px;">
                <button onclick="confirmarGuardado('${nombreTemp}')" style="flex:1; padding:10px; background:var(--oro); border:none; border-radius:4px; font-family:'Cinzel'; font-weight:bold; cursor:pointer;"><i class="fa-solid fa-floppy-disk"></i> GUARDAR</button>
                <button onclick="location.reload()" style="flex:1; padding:10px; background:rgba(255,255,255,0.05); border:1px solid var(--oro); color:var(--oro); border-radius:4px; font-family:'Cinzel'; font-weight:bold; cursor:pointer;"><i class="fa-solid fa-trash-can"></i> TIRAR</button>
            </div>
        </div>
    `;
}

async function confirmarGuardado(nombre) {
    const audioId = 'aud_' + Date.now();
    await localforage.setItem(audioId, audioBlobTemporal);
    guardarConUbicacion(nombre, true, audioId);
    location.reload();
}

function guardarConUbicacion(nombre, pendiente, audioId) {
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const { latitude, longitude } = pos.coords;
                let calle = "Ubicación guardada";
                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const d = await r.json();
                    calle = d.address.road || d.address.pedestrian || "Calle desconocida";
                } catch(e){}
                finalizarEscritura(nombre, pendiente, audioId, latitude, longitude, calle);
            },
            () => finalizarEscritura(nombre, pendiente, audioId, null, null, "Sin GPS"),
            { timeout: 5000 }
        );
    } else {
        finalizarEscritura(nombre, pendiente, audioId, null, null, "Sin GPS");
    }
}

function finalizarEscritura(nombre, pendiente, audioId, lat, lon, calle) {
    let list = JSON.parse(localStorage.getItem('misMarchas')) || [];
    list.unshift({
        nombre, audioId, pendiente, lat, lon, calle,
        fecha: new Date().toLocaleString([], {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}),
        fav: false
    });
    localStorage.setItem('misMarchas', JSON.stringify(list));
}

// ═══════════════════════════════════════════════
// GESTIÓN DEL MAPA
// ═══════════════════════════════════════════════
function inicializarMapa() {
    if (leafletMap) return; 

    leafletMap = L.map('mapa-container').setView([37.3891, -5.9845], 13);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(leafletMap);

    markersGroup = L.layerGroup().addTo(leafletMap);
}

function cargarPinesEnMapa() {
    if (!markersGroup) return;
    markersGroup.clearLayers();
    
    const marchas = JSON.parse(localStorage.getItem('misMarchas')) || [];
    const pines = [];

    marchas.forEach(m => {
        if (m.lat && m.lon) {
            const popupCont = `
                <div style="color:#000; font-family:sans-serif;">
                    <strong>${m.nombre}</strong><br>
                    <small>${m.fecha}</small><br>
                    <small>📍 ${m.calle}</small>
                </div>
            `;
            const marker = L.marker([m.lat, m.lon]).bindPopup(popupCont);
            markersGroup.addLayer(marker);
            pines.push([m.lat, m.lon]);
        }
    });

    if (pines.length > 0) {
        leafletMap.fitBounds(pines, { padding: [50, 50] });
    }
}

// ═══════════════════════════════════════════════
// UI Y TABS
// ═══════════════════════════════════════════════
function cambiarTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');

    if (id === 'mapa') {
        inicializarMapa();
        setTimeout(() => {
            leafletMap.invalidateSize();
            cargarPinesEnMapa();
        }, 200);
    }
    if (id === 'historial') renderLista('lista-historial', false);
    if (id === 'favoritos') renderLista('lista-favoritos', true);
}

function renderLista(containerId, soloFavs) {
    const box = document.getElementById(containerId);
    let marchas = JSON.parse(localStorage.getItem('misMarchas')) || [];
    if (soloFavs) marchas = marchas.filter(m => m.fav);

    if (marchas.length === 0) {
        box.innerHTML = '<p style="text-align:center; opacity:0.4; margin-top:50px; font-style:italic;">La libreta está vacía por ahora.</p>';
        return;
    }

    // El style con animation-delay hace el efecto cascada al cargar la lista
    box.innerHTML = marchas.map((m, idx) => `
        <div class="historial-item anim-cascada" style="animation-delay: ${idx * 0.05}s;">
            <div class="btn-corazon ${m.fav ? 'fav':''}" onclick="toggleFav(${idx})"><i class="fa-solid fa-heart"></i></div>
            <div style="flex:1">
                <div class="historial-n">${m.nombre}</div>
                <div class="historial-f"><i class="fa-regular fa-clock" style="margin-right:4px;"></i> ${m.fecha}</div>
                <div class="historial-ubi"><i class="fa-solid fa-location-dot" style="margin-right:4px;"></i> ${m.calle}</div>
                <div class="botones-accion">
                    ${m.pendiente ? 
                        `<button class="btn-min btn-play" onclick="reproducir('${m.audioId}')"><i class="fa-solid fa-play"></i> Escuchar</button>` :
                        `<a href="https://www.youtube.com/results?search_query=${m.nombre}+marcha" target="_blank" class="btn-min btn-yt"><i class="fa-brands fa-youtube"></i> YouTube</a>
                         <a href="https://api.whatsapp.com/send?text=${encodeURIComponent('🎺 Escuchando *' + m.nombre + '* en ' + m.calle + '. ¡Cazada con mi Shazam Cofrade!')}" target="_blank" class="btn-min btn-wa"><i class="fa-brands fa-whatsapp" style="font-size: 13px;"></i> Compartir</a>`
                    }
                    <button class="btn-min" style="background:rgba(255,255,255,0.08); color:#ff6b6b; padding: 8px 10px;" onclick="borrarUna(${idx})"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        </div>
    `).join('');
}

async function reproducir(id) {
    const blob = await localforage.getItem(id);
    if (reproductorActual) reproductorActual.pause();
    reproductorActual = new Audio(URL.createObjectURL(blob));
    reproductorActual.play();
}

function toggleFav(idx) {
    let list = JSON.parse(localStorage.getItem('misMarchas'));
    list[idx].fav = !list[idx].fav;
    localStorage.setItem('misMarchas', JSON.stringify(list));
    renderLista('lista-historial', false); renderLista('lista-favoritos', true);
}

function borrarUna(idx) {
    if(confirm("¿Seguro que quieres borrar esta marcha de la libreta?")) {
        let list = JSON.parse(localStorage.getItem('misMarchas'));
        list.splice(idx, 1);
        localStorage.setItem('misMarchas', JSON.stringify(list));
        renderLista('lista-historial', false);
    }
}

function setEstado(s) {
    const b = document.getElementById('mic-btn');
    const l = document.getElementById('mic-estado');
    if(s==='grabando'){ b.classList.add('grabando'); b.innerHTML='<i class="fa-solid fa-stop"></i>'; l.innerText='ESCUCHANDO A LA BANDA...'; }
    else if(s==='procesando'){ b.innerHTML='<span class="spinner"></span>'; l.innerText='BUSCANDO EN EL ARCHIVO...'; }
    else { b.classList.remove('grabando'); b.innerHTML='<i class="fa-solid fa-microphone"></i>'; l.innerText='TOCA PARA IDENTIFICAR'; }
}
// ═══════════════════════════════════════════════
// INSTALACIÓN PWA (BOTÓN MÁGICO)
// ═══════════════════════════════════════════════
let eventoInstalacion = null;
const btnInstalar = document.getElementById('btn-instalar');

// El navegador avisa de que la app se puede instalar
window.addEventListener('beforeinstallprompt', (e) => {
    // Evitamos que salga la mini-barra automática de Chrome
    e.preventDefault();
    // Guardamos el evento para usarlo luego
    eventoInstalacion = e;
    // ¡Hacemos visible nuestro botón dorado!
    btnInstalar.style.display = 'block';
});

// Qué pasa cuando el usuario toca nuestro botón
btnInstalar.addEventListener('click', async () => {
    if (!eventoInstalacion) return;
    
    // Mostramos la ventana nativa del móvil para instalar
    eventoInstalacion.prompt();
    
    // Esperamos a ver si le da a "Aceptar" o "Cancelar"
    const { outcome } = await eventoInstalacion.userChoice;
    if (outcome === 'accepted') {
        console.log('¡App instalada!');
        btnInstalar.style.display = 'none'; // Lo ocultamos porque ya está instalada
    }
    
    // Limpiamos la variable
    eventoInstalacion = null;
});

// Por si la instala desde el menú del navegador sin usar nuestro botón
window.addEventListener('appinstalled', () => {
    btnInstalar.style.display = 'none';
});

// Inicio
renderLista('lista-historial', false);
</script>
