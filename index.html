<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cofradam – Mapa y Sonidos de Semana Santa</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --oro: #c9a84c;
      --oro-dim: rgba(201,168,76,0.15);
      --oro-border: rgba(201,168,76,0.25);
      --crema: #e8d5b0;
      --fondo: #080507;
      --rojo: #8b1a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--fondo);
      color: var(--crema);
      font-family: 'Crimson Text', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 52px 24px 36px;
      border-bottom: 1px solid var(--oro-border);
      background: radial-gradient(ellipse at 50% 0%, rgba(180,120,20,0.1) 0%, transparent 65%);
    }
    .cruz { font-size: 20px; color: rgba(201,168,76,0.4); letter-spacing: 20px; display: block; margin-bottom: 14px; }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(24px, 6vw, 44px);
      font-weight: 900;
      color: var(--oro);
      letter-spacing: 4px;
      text-shadow: 0 0 60px rgba(180,140,50,0.35);
    }
    .subtitle { font-style: italic; color: rgba(232,213,176,0.45); font-size: 17px; margin-top: 10px; }

    /* ── TABS ── */
    nav {
      display: flex;
      justify-content: center;
      border-bottom: 1px solid rgba(201,168,76,0.12);
      overflow-x: auto;
      background: #0d090b;
      position: sticky; top: 0; z-index: 1000;
    }
    nav button {
      padding: 17px 15px;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: rgba(232,213,176,0.35);
      font-family: 'Cinzel', serif;
      font-size: 10px; letter-spacing: 1.5px;
      cursor: pointer; transition: all 0.25s;
      white-space: nowrap;
    }
    nav button.active { color: var(--oro); border-bottom-color: var(--oro); }

    /* ── CONTENIDO ── */
    main { max-width: 780px; margin: 0 auto; padding: 20px 20px 60px; }
    .tab-panel { display: none; min-height: 400px; }
    .tab-panel.active { display: block; animation: aparecer 0.4s ease; }

    /* ── MAPA ── */
    #mapa-container {
      width: 100%;
      height: 70vh;
      border-radius: 8px;
      border: 1px solid var(--oro-border);
      background: #111;
      z-index: 10;
    }

    /* ── BOTÓN MICRÓFONO ── */
    .escuchar-section { text-align: center; padding: 40px 0; }
    .mic-btn {
      width: 110px; height: 110px; border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.35); background: rgba(201,168,76,0.04);
      color: var(--oro); font-size: 42px; cursor: pointer; transition: all 0.3s;
      display: inline-flex; align-items: center; justify-content: center; position: relative;
    }
    .mic-btn.grabando { border-color: #c0392b; color: #e74c3c; box-shadow: 0 0 20px rgba(192,57,43,0.3); }

    .mic-estado { display: block; margin-top: 15px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; color: rgba(232,213,176,0.4); }

    /* ── TARJETAS HISTORIAL ── */
    .historial-item {
      background: rgba(201,168,76,0.03); border: 1px solid rgba(201,168,76,0.1);
      border-radius: 6px; padding: 18px; margin-bottom: 12px; display: flex;
    }
    .btn-corazon { font-size: 20px; margin-right: 15px; cursor: pointer; opacity: 0.3; }
    .btn-corazon.fav { opacity: 1; color: var(--rojo); }
    .historial-n { font-family: 'Cinzel', serif; color: var(--oro); font-size: 18px; margin-bottom: 3px; }
    .historial-f { font-size: 12px; opacity: 0.5; }
    .historial-ubi { font-size: 12px; color: var(--oro); margin-top: 6px; text-decoration: none; display: block;}

    /* ── BOTONES ACCIÓN ── */
    .botones-accion { display: flex; gap: 8px; margin-top: 12px; }
    .btn-min { 
        padding: 8px 12px; border-radius: 4px; font-family: 'Cinzel', serif; font-size: 9px; 
        font-weight: bold; border: none; cursor: pointer; text-decoration: none; text-align: center;
    }
    .btn-yt { background: #cd201f; color: white; }
    .btn-wa { background: #25D366; color: white; }
    .btn-play { background: rgba(201,168,76,0.2); color: var(--oro); border: 1px solid var(--oro); }

    .resultado-error {
      background: rgba(139,26,26,0.1); border: 1px solid rgba(139,26,26,0.3);
      padding: 20px; border-radius: 6px; color: #f8d7da;
    }

    .spinner {
      display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(201,168,76,0.2);
      border-top-color: var(--oro); border-radius: 50%; animation: girar 0.8s linear infinite;
    }
    @keyframes girar { to{transform:rotate(360deg)} }
    @keyframes aparecer { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<header class="hero">
  <span class="cruz">✝</span>
  <h1>COFRADAM</h1>
  <p class="subtitle">La libreta sonora del cofrade</p>
</header>

<nav>
  <button class="active" onclick="cambiarTab('identificar', this)">🎙️ ESCUCHAR</button>
  <button onclick="cambiarTab('historial', this)">📖 LIBRETA</button>
  <button onclick="cambiarTab('mapa', this)">📍 EL MAPA</button>
  <button onclick="cambiarTab('favoritos', this)">❤️ MIS JOYAS</button>
</nav>

<main>
  <div class="tab-panel active" id="tab-identificar">
    <div class="escuchar-section">
      <button class="mic-btn" id="mic-btn" onclick="toggleGrabacion()">🎙️</button>
      <span class="mic-estado" id="mic-estado">TOCA PARA IDENTIFICAR</span>
    </div>
    <div id="resultado-wrap" style="display:none"></div>
  </div>

  <div class="tab-panel" id="tab-historial">
    <div id="lista-historial"></div>
  </div>

  <div class="tab-panel" id="tab-mapa">
    <div style="text-align:center; margin-bottom:15px;">
        <h2 style="font-family: 'Cinzel', serif; color: var(--oro);">Geolocalización Cofrade</h2>
        <p style="font-size: 14px; opacity: 0.6;">Tus marchas cazadas situadas en el mapa</p>
    </div>
    <div id="mapa-container"></div>
  </div>

  <div class="tab-panel" id="tab-favoritos">
    <div id="lista-favoritos"></div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════
// VARIABLES Y CONFIG
// ═══════════════════════════════════════════════
let mediaRecorder = null, audioChunks = [], grabando = false;
let audioBlobTemporal = null, reproductorActual = null;
let leafletMap = null, markersGroup = null;

localforage.config({ name: 'ShazamCofrade', storeName: 'audios' });

// ═══════════════════════════════════════════════
// GRABACIÓN Y RECONOCIMIENTO
// ═══════════════════════════════════════════════
async function toggleGrabacion() {
    if (grabando) return; // Ya estamos grabando o procesando
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => procesarAudio();
        
        mediaRecorder.start();
        grabando = true;
        setEstado('grabando');
        
        setTimeout(() => {
            if(mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
            }
        }, 12000); // 12 segundos de muestra
    } catch(err) {
        alert("Error: Activa el permiso de micrófono.");
    }
}

async function procesarAudio() {
    grabando = false;
    setEstado('procesando');
    
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onloadend = async () => {
        const base64Audio = reader.result.split(',')[1];
        try {
            const res = await fetch('/.netlify/functions/identificar', {
                method: 'POST',
                body: JSON.stringify({ audioBase64: base64Audio })
            });
            const data = await res.json();
            mostrarResultado(data, blob);
        } catch(e) {
            audioBlobTemporal = blob;
            mostrarOpcionGuardar('📡 Sin conexión', 'Sin conexión (Pendiente)');
        }
    };
}

function mostrarResultado(data, blob) {
    setEstado('listo');
    const wrap = document.getElementById('resultado-wrap');
    wrap.style.display = 'block';

    if (data.status?.code === 0 && data.metadata?.music?.[0]) {
        const m = data.metadata.music[0];
        const nombre = m.title;
        // ÉXITO: Guardamos con ubicación directamente
        guardarConUbicacion(nombre, false, null);
        wrap.innerHTML = `
            <div class="resultado-card" style="padding:20px; border:1px solid var(--oro); background:rgba(201,168,76,0.05);">
                <div class="resultado-titulo" style="font-family:'Cinzel'; color:var(--oro); font-size:22px;">${nombre}</div>
                <div style="font-size:14px; opacity:0.7;">Identificada con éxito</div>
                <button class="btn-otra" style="width:100%; margin-top:15px; padding:10px; background:var(--oro); border:none; font-family:'Cinzel';" onclick="location.reload()">🎙️ OTRA MARCHA</button>
            </div>
        `;
    } else {
        audioBlobTemporal = blob;
        mostrarOpcionGuardar('🤷🏻‍♂️ No reconocida', 'Marcha Desconocida');
    }
}

// ═══════════════════════════════════════════════
// GUARDADO OPCIONAL Y GPS (ERRORES CORREGIDOS)
// ═══════════════════════════════════════════════
function mostrarOpcionGuardar(errorTxt, nombreTemp) {
    const wrap = document.getElementById('resultado-wrap');
    wrap.style.display = 'block';
    const url = URL.createObjectURL(audioBlobTemporal);
    wrap.innerHTML = `
        <div class="resultado-error">
            <strong>${errorTxt}</strong><br><small>¿Quieres guardar la grabación para intentarlo luego?</small>
            <audio controls src="${url}" style="width:100%; margin:15px 0; height:30px;"></audio>
            <div style="display:flex; gap:10px;">
                <button onclick="confirmarGuardado('${nombreTemp}')" style="flex:1; padding:10px; background:var(--oro); border:none;">💾 GUARDAR</button>
                <button onclick="location.reload()" style="flex:1; padding:10px; background:transparent; border:1px solid var(--oro); color:var(--oro);">🗑️ TIRAR</button>
            </div>
        </div>
    `;
}

async function confirmarGuardado(nombre) {
    const audioId = 'aud_' + Date.now();
    await localforage.setItem(audioId, audioBlobTemporal);
    guardarConUbicacion(nombre, true, audioId);
    location.reload();
}

function guardarConUbicacion(nombre, pendiente, audioId) {
    // Intentamos obtener GPS, pero si falla o no hay permiso, guardamos IGUAL (Corrección de error)
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const { latitude, longitude } = pos.coords;
                let calle = "Ubicación guardada";
                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const d = await r.json();
                    calle = d.address.road || d.address.pedestrian || "Calle desconocida";
                } catch(e){}
                finalizarEscritura(nombre, pendiente, audioId, latitude, longitude, calle);
            },
            () => finalizarEscritura(nombre, pendiente, audioId, null, null, "Sin GPS"),
            { timeout: 5000 }
        );
    } else {
        finalizarEscritura(nombre, pendiente, audioId, null, null, "Sin GPS");
    }
}

function finalizarEscritura(nombre, pendiente, audioId, lat, lon, calle) {
    let list = JSON.parse(localStorage.getItem('misMarchas')) || [];
    list.unshift({
        nombre, audioId, pendiente, lat, lon, calle,
        fecha: new Date().toLocaleString([], {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}),
        fav: false
    });
    localStorage.setItem('misMarchas', JSON.stringify(list));
}

// ═══════════════════════════════════════════════
// GESTIÓN DEL MAPA
// ═══════════════════════════════════════════════
function inicializarMapa() {
    if (leafletMap) return; // Ya creado

    // Crear mapa centrado en un punto por defecto (ej. Sevilla)
    leafletMap = L.map('mapa-container').setView([37.3891, -5.9845], 13);
    
    // Capa de mapa oscuro (CartoDB Dark Matter) queda genial con el diseño cofrade
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(leafletMap);

    markersGroup = L.layerGroup().addTo(leafletMap);
}

function cargarPinesEnMapa() {
    if (!markersGroup) return;
    markersGroup.clearLayers();
    
    const marchas = JSON.parse(localStorage.getItem('misMarchas')) || [];
    const pines = [];

    marchas.forEach(m => {
        if (m.lat && m.lon) {
            const popupCont = `
                <div style="color:#000; font-family:sans-serif;">
                    <strong>${m.nombre}</strong><br>
                    <small>${m.fecha}</small><br>
                    <small>📍 ${m.calle}</small>
                </div>
            `;
            const marker = L.marker([m.lat, m.lon]).bindPopup(popupCont);
            markersGroup.addLayer(marker);
            pines.push([m.lat, m.lon]);
        }
    });

    if (pines.length > 0) {
        leafletMap.fitBounds(pines, { padding: [50, 50] });
    }
}

// ═══════════════════════════════════════════════
// UI Y TABS
// ═══════════════════════════════════════════════
function cambiarTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');

    if (id === 'mapa') {
        inicializarMapa();
        // Corrección de error de Leaflet: re-calcular tamaño al mostrar pestaña
        setTimeout(() => {
            leafletMap.invalidateSize();
            cargarPinesEnMapa();
        }, 200);
    }
    if (id === 'historial') renderLista('lista-historial', false);
    if (id === 'favoritos') renderLista('lista-favoritos', true);
}

function renderLista(containerId, soloFavs) {
    const box = document.getElementById(containerId);
    let marchas = JSON.parse(localStorage.getItem('misMarchas')) || [];
    if (soloFavs) marchas = marchas.filter(m => m.fav);

    if (marchas.length === 0) {
        box.innerHTML = '<p style="text-align:center; opacity:0.3; margin-top:50px;">No hay marchas aquí todavía.</p>';
        return;
    }

    box.innerHTML = marchas.map((m, idx) => `
        <div class="historial-item">
            <div class="btn-corazon ${m.fav ? 'fav':''}" onclick="toggleFav(${idx})">❤️</div>
            <div style="flex:1">
                <div class="historial-n">${m.nombre}</div>
                <div class="historial-f">${m.fecha} • 📍 ${m.calle}</div>
                <div class="botones-accion">
                    ${m.pendiente ? 
                        `<button class="btn-min btn-play" onclick="reproducir('${m.audioId}')">▶️ ESCUCHAR</button>` :
                        `<a href="https://www.youtube.com/results?search_query=${m.nombre}+marcha" target="_blank" class="btn-min btn-yt">YOUTUBE</a>`
                    }
                    <button class="btn-min" style="background:rgba(255,255,255,0.1); color:white;" onclick="borrarUna(${idx})">🗑️</button>
                </div>
            </div>
        </div>
    `).join('');
}

async function reproducir(id) {
    const blob = await localforage.getItem(id);
    if (reproductorActual) reproductorActual.pause();
    reproductorActual = new Audio(URL.createObjectURL(blob));
    reproductorActual.play();
}

function toggleFav(idx) {
    let list = JSON.parse(localStorage.getItem('misMarchas'));
    list[idx].fav = !list[idx].fav;
    localStorage.setItem('misMarchas', JSON.stringify(list));
    renderLista('lista-historial', false); renderLista('lista-favoritos', true);
}

function borrarUna(idx) {
    if(confirm("¿Borrar esta marcha?")) {
        let list = JSON.parse(localStorage.getItem('misMarchas'));
        list.splice(idx, 1);
        localStorage.setItem('misMarchas', JSON.stringify(list));
        renderLista('lista-historial', false);
    }
}

function setEstado(s) {
    const b = document.getElementById('mic-btn');
    const l = document.getElementById('mic-estado');
    if(s==='grabando'){ b.classList.add('grabando'); b.innerHTML='⏹'; l.innerText='ESCUCHANDO...'; }
    else if(s==='procesando'){ b.innerHTML='<span class="spinner"></span>'; l.innerText='IDENTIFICANDO...'; }
    else { b.classList.remove('grabando'); b.innerHTML='🎙️'; l.innerText='TOCA PARA IDENTIFICAR'; }
}

// Inicio
renderLista('lista-historial', false);
</script>
</body>
</html>
